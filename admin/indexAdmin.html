<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Panel de Administración</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="../css/admin.css" />
  </head>

  <body class="bg-light admin-page">
    <main class="container py-5">
      <div class="mb-4">
        <a href="../main.html" class="btn btn-outline-dark">
          <i class="bi bi-arrow-left"></i>
          Volver a la tienda
        </a>
      </div>

      <div class="card shadow border-0">
        <div class="card-header bg-dark text-white">
          <h2 class="mb-0">
            <i class="bi bi-speedometer2 me-2"></i>
            Panel de Administración
          </h2>
        </div>

        <div class="list-group list-group-flush">
          <a href="altaProducto.html" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
            <span>
              <i class="bi bi-plus-circle me-2"></i>
              Alta de producto
            </span>
            <i class="bi bi-chevron-right"></i>
          </a>

          <a href="modificarStock.html" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
            <span>
              <i class="bi bi-pencil-square me-2"></i>
              Modificar stock
            </span>
            <i class="bi bi-chevron-right"></i>
          </a>

          <a href="altaUsuario.html" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
            <span>
              <i class="bi bi-person-plus me-2"></i>
              Alta de usuario
            </span>
            <i class="bi bi-chevron-right"></i>
          </a>

          <a href="gestionUsuarios.html" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
            <span>
              <i class="bi bi-people me-2"></i>
              Gestión de usuarios
            </span>
            <i class="bi bi-chevron-right"></i>
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
