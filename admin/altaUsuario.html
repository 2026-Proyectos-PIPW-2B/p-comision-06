
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Alta de Usuario</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="../css/admin.css" />
  </head>

  <body class="bg-light admin-page">
    <main class="container py-5">
      <div class="mb-4">
        <a href="indexAdmin.html" class="btn btn-outline-dark">
          <i class="bi bi-arrow-left"></i>
          Volver al panel
        </a>
      </div>

      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow border-0">
            <div class="card-header bg-dark text-white">
              <h2 class="mb-0">
                <i class="bi bi-person-plus me-2"></i>
                Alta de Usuario
              </h2>
            </div>

            <div class="card-body">
              <form id="formAltaUsuario" novalidate>
                <div class="mb-3">
                  <label for="nombre" class="form-label">
                    Nombre de usuario
                  </label>

                  <input type="text" class="form-control" id="nombre" />

                  <div class="invalid-feedback"></div>
                </div>

                <div class="mb-3">
                  <label for="password" class="form-label"> Contraseña </label>

                  <input type="password" class="form-control" id="password" />

                  <div class="invalid-feedback"></div>
                </div>

                <div class="mb-3">
                  <label for="email" class="form-label"> Email </label>

                  <input type="email" class="form-control" id="email" />

                  <div class="invalid-feedback"></div>
                </div>

                <div class="row">
                  <div class="col-md-6">
                    <div class="mb-3">
                      <label for="nombrePersona" class="form-label">
                        Nombre
                      </label>

                      <input
                        type="text"
                        class="form-control"
                        id="nombrePersona"
                      />

                      <div class="invalid-feedback"></div>
                    </div>
                  </div>

                  <div class="col-md-6">
                    <div class="mb-3">
                      <label for="apellido" class="form-label">
                        Apellido
                      </label>

                      <input type="text" class="form-control" id="apellido" />

                      <div class="invalid-feedback"></div>
                    </div>
                  </div>
                </div>

                <div class="mb-4">
                  <label for="edad" class="form-label"> Edad </label>

                  <input type="number" class="form-control" id="edad" />

                  <div class="invalid-feedback"></div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                  <button type="submit" class="btn btn-warning">
                    <i class="bi bi-floppy"></i>
                    Guardar usuario
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/validator/13.15.15/validator.min.js"></script>

    <script src="../js/scriptAltaUsuario.js"></script>
  </body>
</html>
