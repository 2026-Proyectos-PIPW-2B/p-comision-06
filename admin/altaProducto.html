<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Alta de Producto</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="../css/admin.css" />
  </head>

  <body class="bg-light admin-page">
    <main class="container py-5">
      <div class="mb-4">
        <a href="indexAdmin.html" class="btn btn-outline-dark">
          <i class="bi bi-arrow-left"></i>
          Volver al panel
        </a>
      </div>

      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow border-0">
            <div class="card-header bg-dark text-white">
              <h2 class="mb-0">
                <i class="bi bi-plus-circle me-2"></i>
                Alta de Producto
              </h2>
            </div>

            <div class="card-body">
              <form id="formAltaProducto" novalidate>
                <!-- NOMBRE -->
                <div class="mb-3">
                  <label for="nombre" class="form-label">
                    Nombre del videojuego
                  </label>

                  <input type="text" class="form-control" id="nombre" />

                  <div id="errorNombre" class="invalid-feedback"></div>
                </div>

                <!-- DESCRIPCION -->
                <div class="mb-3">
                  <label for="descripcion" class="form-label">
                    Descripción
                  </label>

                  <textarea
                    class="form-control"
                    id="descripcion"
                    rows="4"
                  ></textarea>

                  <div id="errorDescripcion" class="invalid-feedback"></div>
                </div>

                <!-- PRECIO Y STOCK -->
                <div class="row">
                  <div class="col-md-6">
                    <div class="mb-3">
                      <label for="precio" class="form-label"> Precio </label>

                      <input
                        type="number"
                        class="form-control"
                        id="precio"
                        step="0.01"
                      />

                      <div id="errorPrecio" class="invalid-feedback"></div>
                    </div>
                  </div>

                  <div class="col-md-6">
                    <div class="mb-3">
                      <label for="stock" class="form-label"> Stock </label>

                      <input type="number" class="form-control" id="stock" />

                      <div id="errorStock" class="invalid-feedback"></div>
                    </div>
                  </div>
                </div>

                <!-- GENERO -->
                <div class="mb-3">
                  <label for="genero" class="form-label"> Género </label>

                  <select class="form-select" id="genero">
                    <option value="">Seleccione un género</option>

                    <option value="Acción">Acción</option>

                    <option value="RPG">RPG</option>

                    <option value="Shooter">Shooter</option>

                    <option value="Aventura">Aventura</option>

                    <option value="Estrategia">Estrategia</option>

                    <option value="Deportes">Deportes</option>
                  </select>

                  <div id="errorGenero" class="invalid-feedback"></div>
                </div>

                <!-- PLATAFORMAS -->
                <div class="mb-3">
                  <label class="form-label"> Plataformas </label>

                  <div class="form-check">
                    <input
                      class="form-check-input plataforma"
                      type="checkbox"
                      id="pc"
                      value="PC"
                    />

                    <label class="form-check-label" for="pc"> PC </label>
                  </div>

                  <div class="form-check">
                    <input
                      class="form-check-input plataforma"
                      type="checkbox"
                      id="playstation"
                      value="PlayStation"
                    />

                    <label class="form-check-label" for="playstation">
                      PlayStation
                    </label>
                  </div>

                  <div class="form-check">
                    <input
                      class="form-check-input plataforma"
                      type="checkbox"
                      id="xbox"
                      value="Xbox"
                    />

                    <label class="form-check-label" for="xbox"> Xbox </label>
                  </div>

                  <div class="form-check">
                    <input
                      class="form-check-input plataforma"
                      type="checkbox"
                      id="nintendo"
                      value="Nintendo"
                    />

                    <label class="form-check-label" for="nintendo">
                      Nintendo
                    </label>
                  </div>

                  <small id="errorPlataformas" class="text-danger"></small>
                </div>

                <!-- IMAGEN -->
                <div class="mb-4">
                  <label for="imagen" class="form-label">
                    Ruta de imagen
                  </label>

                  <input
                    type="text"
                    class="form-control"
                    id="imagen"
                    placeholder="img/eldenring.jpg"
                  />

                  <div id="errorImagen" class="invalid-feedback"></div>

                  <div class="form-text">
                    Ingrese la ruta relativa de la imagen dentro del proyecto.
                  </div>
                </div>

                <!-- BOTONES -->
                <div class="d-flex justify-content-end gap-2">
                  <button type="reset" class="btn btn-outline-secondary">
                    Limpiar
                  </button>

                  <button type="submit" class="btn btn-warning">
                    <i class="bi bi-floppy"></i>
                    Guardar producto
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/validator/13.15.15/validator.min.js"></script>

    <script src="../js/scriptAltaProducto.js"></script>
  </body>
</html>
