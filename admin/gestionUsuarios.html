<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gestión de Usuarios</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="../css/admin.css" />
  </head>

  <body class="bg-light admin-page">
    <main class="container py-5">
      <div class="mb-4">
        <a href="indexAdmin.html" class="btn btn-outline-dark">
          <i class="bi bi-arrow-left"></i>
          Volver al panel
        </a>
      </div>

      <div class="card shadow border-0">
        <div class="card-header bg-dark text-white">
          <h2 class="mb-0">
            <i class="bi bi-people me-2"></i>
            Gestión de Usuarios
          </h2>
        </div>

        <div class="card-body">

          <div id="sinUsuarios" class="alert alert-info d-none" role="alert">
            <i class="bi bi-info-circle me-2"></i>
            No hay usuarios registrados todavía.
          </div>

          <div class="table-responsive">
            <table class="table table-hover align-middle" id="tablaUsuarios">
              <thead class="table-dark">
                <tr>
                  <th>Nombre usuario</th>
                  <th>Nombre completo</th>
                  <th>Email</th>
                  <th>Edad</th>
                  <th>Estado</th>
                  <th>Acción</th>
                  <th>Eliminar</th>
                </tr>
              </thead>
              <tbody id="cuerpoTabla">
              </tbody>
            </table>
          </div>

        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/scriptListaUsuarios.js"></script>
  </body>
</html>
