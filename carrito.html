<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Carrito</title>

    <link rel="stylesheet" href="css/main.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>

  <body class="d-flex flex-column min-vh-100">
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
      <div class="container">
        <a class="navbar-brand fw-bold" href="main.html">Placeholder name</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link d-flex align-items-center gap-2" href="main.html">
                <i class="bi bi-grid"></i>
                Catálogo
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link d-flex align-items-center gap-2 active" href="carrito.html">
                <i class="bi bi-cart3"></i>
                Carrito
                <span id="carritoContador" class="badge bg-warning text-dark">2</span>
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link d-flex align-items-center gap-2" href="#" id="btnCerrarSesion">
                <i class="bi bi-box-arrow-right"></i>
                Cerrar sesión
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="flex-grow-1">

      <section class="carrito-section py-5 mt-5">
        <div class="container">

          <h2 class="fw-bold mb-4">
            <i class="bi bi-cart3 me-2"></i>
            Mi carrito
          </h2>

          <div id="carritoContenido">
            <div class="table-responsive">
              <table class="table table-dark table-borderless table-hover align-middle">
                <thead>
                  <tr>
                    <th>Juego</th>
                    <th>Precio</th>
                    <th class="text-center">Cantidad</th>
                    <th class="text-end">Subtotal</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="carritoTabla">
                    <tr>
                        <td>Cyberpunk 2077</td>
                        <td>$59.99</td>
                        <td class="align-middle">
                          <div class="d-flex justify-content-center">
                            <input type="number" class="form-control form-control-sm text-center w-50" min="1" value="1">
                          </div>
                        </td>
                        <td>$59.99</td>
                        <td>
                          <button class="btn btn-outline-danger btn-sm">
                            <i class="bi bi-trash"></i>
                          </button>
                        </td>
                      </tr>

                      <tr>
                        <td>Elden Ring</td>
                        <td>$69.99</td>
                        <td class="align-middle">
                          <div class="d-flex justify-content-center">
                            <input type="number" class="form-control form-control-sm text-center w-50" min="1" value="1">
                          </div>
                        </td>
                        <td>$139.98</td>
                        <td>
                          <button class="btn btn-outline-danger btn-sm">
                            <i class="bi bi-trash"></i>
                          </button>
                        </td>
                      </tr>
                </tbody>
              </table>
            </div>

    
            <div class="d-flex justify-content-end align-items-center gap-4 mt-3 flex-wrap">
              <div class="text-end">
                <p class="text-muted mb-0 small">Total</p>
                <h3 class="fw-bold text-warning mb-0" id="carritoTotal">$199.97</h3>
              </div>
              <button id="btnConfirmar" class="btn btn-warning btn-lg fw-bold">
                <i class="bi bi-bag-check me-2"></i>
                Confirmar pedido
              </button>
            </div>
          </div>

          <div id="carritoVacio" class="text-center py-5 d-none">
            <i class="bi bi-cart-x fs-1 text-muted mb-3 d-block"></i>
            <h5 class="text-muted">Tu carrito está vacío</h5>
            <a href="#" class="btn btn-warning mt-3">
              <i class="bi bi-grid me-2"></i>
              Ver catálogo
            </a>
          </div>

          <div id="pedidoConfirmado" class="alert alert-success d-none mt-4">
            <i class="bi bi-check-circle me-2"></i>
            ¡Pedido confirmado! Gracias por tu compra.
          </div>

        </div>
      </section>
    </main>
   

    <!-- FOOTER -->
    <footer class="bg-dark text-white py-4">
      <div class="container">
        <p class="text-center mb-0">© 2026 Placeholder name</p>
      </div>
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  </body>
</html>
