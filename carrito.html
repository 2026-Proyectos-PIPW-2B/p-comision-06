<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Carrito</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body class="bg-light">
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
      <div class="container">
        <a class="navbar-brand fw-bold" href="main.html"> GameStore </a>

        <div class="ms-auto">
          <a href="main.html" class="btn btn-outline-light">
            <i class="bi bi-arrow-left"></i>
            Volver al catálogo
          </a>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <div class="card shadow border-0">
            <div class="card-header bg-dark text-white">
              <h2 class="mb-0">
                <i class="bi bi-cart3 me-2"></i>
                Mi carrito
              </h2>
            </div>

            <div class="card-body">
              <!-- Carrito vacío -->
              <div id="carritoVacio" class="alert alert-warning d-none">
                No hay productos en el carrito.
              </div>

              <!-- Tabla -->
              <div id="contenedorCarrito">
                <div class="table-responsive">
                  <table class="table table-hover align-middle">
                    <thead class="table-dark">
                      <tr>
                        <th>Juego</th>
                        <th>Precio</th>
                        <th>Cantidad</th>
                        <th>Subtotal</th>
                        <th>Acciones</th>
                      </tr>
                    </thead>

                    <tbody id="tablaCarrito"></tbody>
                  </table>
                </div>

                <div class="row mt-4">
                  <div class="col-md-6"></div>

                  <div class="col-md-6">
                    <div class="card bg-light">
                      <div class="card-body">
                        <h5>Total del pedido</h5>

                        <h2 id="totalCarrito" class="text-warning fw-bold">
                          $0
                        </h2>

                        <button
                          id="btnFinalizarCompra"
                          class="btn btn-warning w-100 mt-3"
                        >
                          <i class="bi bi-bag-check"></i>
                          Finalizar compra
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div id="mensajeCompra" class="alert alert-success mt-4 d-none">
                Compra realizada correctamente.
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="js/scriptCarrito.js"></script>
  </body>
</html>
