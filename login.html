<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login</title>

    <link rel="stylesheet" href="css/index.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">GameStore</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a
                class="nav-link d-flex align-items-center gap-2"
                href="login.html"
              >
                <i class="bi bi-person-circle"></i>
                Login
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <section
      class="login-section d-flex align-items-center justify-content-center min-vh-100"
    >
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-sm-8 col-md-5 col-lg-4">
            <div class="card shadow bg-dark text-white">
              <div class="card-body p-4">
                <div class="text-center mb-4">
                  <i class="bi bi-controller fs-1 text-warning"></i>
                  <h4 class="fw-bold mt-2">Game Store</h4>
                  <p class="text-light-emphasis small">
                    Ingresá con tu cuenta para continuar
                  </p>
                </div>

                <div class="mb-3">
                  <label class="form-label">Usuario</label>
                  <input
                    type="text"
                    id="inputUsuario"
                    class="form-control"
                    placeholder="Tu usuario"
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Contraseña</label>
                  <input
                    type="password"
                    id="inputPassword"
                    class="form-control"
                    placeholder="Tu contraseña"
                  />
                </div>

                <div id="mensajeError" class="alert alert-danger d-none">
                  <i class="bi bi-exclamation-circle me-2"></i>
                  Usuario o contraseña incorrectos.
                </div>

                <button
                  id="btnLogin"
                  class="btn btn-warning w-100 fw-bold mt-2"
                >
                  Ingresar
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-dark text-white py-4">
      <div class="container">
        <p class="text-center mb-0">© 2026 Game Store</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/scriptLogin.js"></script>
  </body>
</html>
